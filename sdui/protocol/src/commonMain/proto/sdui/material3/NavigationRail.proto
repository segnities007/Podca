syntax = "proto3";

package sdui.material3;

import "sdui/ui/graphics/Color.proto";
import "sdui/ui/modifier/Modifier.proto";

option java_package = "com.podca.sdui.protocol.material3";
option java_multiple_files = true;

message NavigationRailItemColorsProto {
  sdui.ui.graphics.ColorProto selected_icon_color = 1;
  sdui.ui.graphics.ColorProto selected_text_color = 2;
  sdui.ui.graphics.ColorProto selected_indicator_color = 3;
  sdui.ui.graphics.ColorProto unselected_icon_color = 4;
  sdui.ui.graphics.ColorProto unselected_text_color = 5;
  sdui.ui.graphics.ColorProto disabled_icon_color = 6;
  sdui.ui.graphics.ColorProto disabled_text_color = 7;
}

message NavigationRailProto {
  sdui.ui.modifier.ModifierProto modifier = 1;
  int32 selected_index = 2;
  bool has_content = 3;
}
