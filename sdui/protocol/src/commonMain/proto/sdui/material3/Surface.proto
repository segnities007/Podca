syntax = "proto3";

package sdui.material3;

import "sdui/ui/graphics/Color.proto";
import "sdui/ui/graphics/Shape.proto";
import "sdui/ui/modifier/Modifier.proto";
import "sdui/ui/unit/Dp.proto";

option java_package = "com.podca.sdui.protocol.material3";
option java_multiple_files = true;

message BorderStrokeProto {
  sdui.ui.unit.DpProto width = 1;
  sdui.ui.graphics.ColorProto color = 2;
}

message SurfaceProto {
  sdui.ui.modifier.ModifierProto modifier = 1;
  sdui.ui.graphics.ShapeProto shape = 2;
  sdui.ui.graphics.ColorProto color = 3;
  sdui.ui.graphics.ColorProto content_color = 4;
  sdui.ui.unit.DpProto tonal_elevation = 5;
  sdui.ui.unit.DpProto shadow_elevation = 6;
  BorderStrokeProto border = 7;
  bool enabled = 8;
  bool selected = 9;
  bool checked = 10;
}
