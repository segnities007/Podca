syntax = "proto3";

package sdui.material3;

import "sdui/material3/DatePicker.proto";

option java_package = "com.podca.sdui.protocol.material3";
option java_multiple_files = true;

message DateRangePickerStateProto {
  int64 selected_start_date_millis = 1;
  int64 selected_end_date_millis = 2;
  int64 displayed_month_millis = 3;
  DisplayModeProto display_mode = 4;
  int32 year_range_start = 5;
  int32 year_range_end = 6;
  string locale_tag = 7;
}
