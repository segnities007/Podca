syntax = "proto3";

package sdui.material3;

import "sdui/ui/graphics/Color.proto";
import "sdui/ui/modifier/Modifier.proto";

option java_package = "com.podca.sdui.protocol.material3";
option java_multiple_files = true;

enum TooltipAnchorPositionProto {
  TOOLTIP_ANCHOR_POSITION_UNSPECIFIED = 0;
  TOOLTIP_ANCHOR_POSITION_ABOVE = 1;
  TOOLTIP_ANCHOR_POSITION_BELOW = 2;
  TOOLTIP_ANCHOR_POSITION_LEFT = 3;
  TOOLTIP_ANCHOR_POSITION_RIGHT = 4;
  TOOLTIP_ANCHOR_POSITION_START = 5;
  TOOLTIP_ANCHOR_POSITION_END = 6;
}

message RichTooltipColorsProto {
  sdui.ui.graphics.ColorProto container_color = 1;
  sdui.ui.graphics.ColorProto content_color = 2;
  sdui.ui.graphics.ColorProto title_content_color = 3;
  sdui.ui.graphics.ColorProto action_content_color = 4;
}

message TooltipProto {
  sdui.ui.modifier.ModifierProto modifier = 1;
  string message = 2;
  TooltipAnchorPositionProto anchor_position = 3;
  RichTooltipColorsProto colors = 4;
  bool has_content = 5;
}
