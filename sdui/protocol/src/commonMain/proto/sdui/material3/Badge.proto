syntax = "proto3";

package sdui.material3;

import "sdui/ui/graphics/Color.proto";
import "sdui/ui/modifier/Modifier.proto";

option java_package = "com.podca.sdui.protocol.material3";
option java_multiple_files = true;

message BadgeDefaultsProto {
  sdui.ui.graphics.ColorProto container_color = 1;
}

message BadgedBoxProto {
  sdui.ui.modifier.ModifierProto modifier = 1;
  bool has_badge = 2;
  bool has_content = 3;
}

message BadgeProto {
  sdui.ui.modifier.ModifierProto modifier = 1;
  sdui.ui.graphics.ColorProto container_color = 2;
  sdui.ui.graphics.ColorProto content_color = 3;
  bool has_content = 4;
}
