syntax = "proto3";

package sdui.material3;

import "sdui/ui/modifier/Modifier.proto";
import "sdui/ui/unit/Dp.proto";

option java_package = "com.podca.sdui.protocol.material3";
option java_multiple_files = true;

message TabPositionProto {
  sdui.ui.unit.DpProto left = 1;
  sdui.ui.unit.DpProto width = 2;
  sdui.ui.unit.DpProto content_width = 3;
}

message TabRowProto {
  sdui.ui.modifier.ModifierProto modifier = 1;
  int32 selected_tab_index = 2;
}
