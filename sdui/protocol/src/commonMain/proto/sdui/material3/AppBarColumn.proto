syntax = "proto3";

package sdui.material3;

import "sdui/material3/AppBarDsl.proto";
import "sdui/ui/modifier/Modifier.proto";

option java_package = "com.podca.sdui.protocol.material3";
option java_multiple_files = true;

message AppBarColumnScopeProto {
  AppBarScopeProto scope = 1;
}

message AppBarColumnProto {
  sdui.ui.modifier.ModifierProto modifier = 1;
  AppBarColumnScopeProto scope = 2;
}
