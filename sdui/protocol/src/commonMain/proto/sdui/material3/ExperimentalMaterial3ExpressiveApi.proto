syntax = "proto3";

package sdui.material3;

option java_package = "com.podca.sdui.protocol.material3";
option java_multiple_files = true;

message ExperimentalMaterial3ExpressiveApiProto {
  string feature_name = 1;
  string since_version = 2;
  bool opt_in_required = 3;
  bool expressive_theme_required = 4;
}
