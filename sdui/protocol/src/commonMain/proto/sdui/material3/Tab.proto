syntax = "proto3";

package sdui.material3;

import "sdui/ui/modifier/Modifier.proto";

option java_package = "com.podca.sdui.protocol.material3";
option java_multiple_files = true;

message TabProto {
  sdui.ui.modifier.ModifierProto modifier = 1;
  bool selected = 2;
  bool enabled = 3;
  string text = 4;
  bool has_icon = 5;
}

message LeadingIconTabProto {
  sdui.ui.modifier.ModifierProto modifier = 1;
  bool selected = 2;
  bool enabled = 3;
  string text = 4;
  bool has_icon = 5;
}
