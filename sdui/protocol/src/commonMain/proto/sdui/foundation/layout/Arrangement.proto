syntax = "proto3";

package sdui.foundation.layout;

import "sdui/ui/alignment/Alignment.proto";
import "sdui/ui/unit/Dp.proto";

option java_package = "com.podca.sdui.protocol.foundation.layout";
option java_multiple_files = true;

enum ArrangementKindProto {
  ARRANGEMENT_KIND_UNSPECIFIED = 0;
  ARRANGEMENT_KIND_START = 1;
  ARRANGEMENT_KIND_END = 2;
  ARRANGEMENT_KIND_TOP = 3;
  ARRANGEMENT_KIND_BOTTOM = 4;
  ARRANGEMENT_KIND_CENTER = 5;
  ARRANGEMENT_KIND_SPACE_EVENLY = 6;
  ARRANGEMENT_KIND_SPACE_BETWEEN = 7;
  ARRANGEMENT_KIND_SPACE_AROUND = 8;
  ARRANGEMENT_KIND_SPACED_BY = 9;
  ARRANGEMENT_KIND_ALIGNED = 10;
}

message ArrangementHorizontalProto {
  ArrangementKindProto kind = 1;
  sdui.ui.unit.DpProto spacing = 2;
  sdui.ui.alignment.HorizontalAlignmentProto alignment = 3;
}

message ArrangementVerticalProto {
  ArrangementKindProto kind = 1;
  sdui.ui.unit.DpProto spacing = 2;
  sdui.ui.alignment.VerticalAlignmentProto alignment = 3;
}
