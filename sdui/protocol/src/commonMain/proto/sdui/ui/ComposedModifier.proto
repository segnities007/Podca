syntax = "proto3";

package sdui.ui;

option java_package = "com.podca.sdui.protocol.ui";
option java_multiple_files = true;

message ComposedModifierFactoryProto {
  string fully_qualified_name = 1;
  repeated string keys = 2;
}

message ComposedModifierProto {
  ComposedModifierFactoryProto factory = 1;
}
