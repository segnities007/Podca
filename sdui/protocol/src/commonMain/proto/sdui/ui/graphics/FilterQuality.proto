syntax = "proto3";

package sdui.ui.graphics;

option java_package = "com.podca.sdui.protocol.ui.graphics";
option java_multiple_files = true;

/**
 * androidx.compose.ui.graphics.FilterQuality 相当
 */
enum FilterQualityProto {
  // 最速、低品質 (Nearest-neighbour)
  FILTER_QUALITY_NONE = 0;
  // 中品質 (Bilinear)
  FILTER_QUALITY_LOW = 1;
  // 高品質 (Bilinear + Mipmaps)
  FILTER_QUALITY_MEDIUM = 2;
  // 最高品質 (Bicubic)
  FILTER_QUALITY_HIGH = 3;
}
