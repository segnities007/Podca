syntax = "proto3";

package sdui.ui.graphics;

import "sdui/ui/unit/Dp.proto";

option java_package = "com.podca.sdui.protocol.ui.graphics";
option java_multiple_files = true;

/**
 * androidx.compose.ui.graphics.LayerOutsets 相当
 */
message LayerOutsetsProto {
  sdui.ui.unit.DpProto left = 1;
  sdui.ui.unit.DpProto top = 2;
  sdui.ui.unit.DpProto right = 3;
  sdui.ui.unit.DpProto bottom = 4;
}
