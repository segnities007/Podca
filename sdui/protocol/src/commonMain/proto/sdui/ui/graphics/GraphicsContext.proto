syntax = "proto3";

package sdui.ui.graphics;

import "sdui/ui/graphics/Canvas.proto";
import "sdui/ui/graphics/RenderEffect.proto";

option java_package = "com.podca.sdui.protocol.ui.graphics";
option java_multiple_files = true;

message GraphicsContextProto {
  CanvasProto canvas = 1;
  RenderEffectCapabilityProto render_effect_capability = 2;
  bool supports_layers = 3;
  bool supports_software_fallback = 4;
}
