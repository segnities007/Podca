syntax = "proto3";

package sdui.ui.graphics;

import "sdui/ui/geometry/Offset.proto";
import "sdui/ui/graphics/Color.proto";

option java_package = "com.podca.sdui.protocol.ui.graphics";
option java_multiple_files = true;

/**
 * androidx.compose.ui.graphics.Shadow 相当
 */
message ShadowProto {
  ColorProto color = 1;
  sdui.ui.geometry.OffsetProto offset = 2;
  float blur_radius = 3;
}
