syntax = "proto3";

package sdui.ui.graphics;

option java_package = "com.podca.sdui.protocol.ui.graphics";
option java_multiple_files = true;

/**
 * androidx.compose.ui.graphics.PathOperation 相当
 */
enum PathOperationProto {
  PATH_OPERATION_DIFFERENCE = 0;
  PATH_OPERATION_INTERSECT = 1;
  PATH_OPERATION_UNION = 2;
  PATH_OPERATION_XOR = 3;
  PATH_OPERATION_REVERSE_DIFFERENCE = 4;
}
