  NAMED_COLOR_SPACE_BT2020 = 5;
  NAMED_COLOR_SPACE_DCI_P3 = 6;
  NAMED_COLOR_SPACE_DISPLAY_P3 = 7;
  NAMED_COLOR_SPACE_NTSC_1953 = 8;
  NAMED_COLOR_SPACE_SMPTE_C = 9;
  NAMED_COLOR_SPACE_ADOBE_RGB = 10;
  NAMED_COLOR_SPACE_PRO_PHOTO_RGB = 11;
  NAMED_COLOR_SPACE_ACES = 12;
  NAMED_COLOR_SPACE_ACESCG = 13;
  NAMED_COLOR_SPACE_CIE_XYZ = 14;
  NAMED_COLOR_SPACE_CIE_LAB = 15;
  NAMED_COLOR_SPACE_UNSPECIFIED = 16;
  NAMED_COLOR_SPACE_BT2020_HLG = 17;
