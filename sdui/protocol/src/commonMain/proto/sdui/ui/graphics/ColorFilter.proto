syntax = "proto3";

package sdui.ui.graphics;

import "sdui/ui/graphics/Color.proto";
import "sdui/ui/graphics/BlendMode.proto";
import "sdui/ui/graphics/ColorMatrix.proto";

option java_package = "com.podca.sdui.protocol.ui.graphics";
option java_multiple_files = true;

/**
 * androidx.compose.ui.graphics.BlendModeColorFilter 相当
 */
message BlendModeColorFilterProto {
  ColorProto color = 1;
  BlendModeProto blend_mode = 2;
}

/**
 * androidx.compose.ui.graphics.ColorMatrixColorFilter 相当
 */
message ColorMatrixColorFilterProto {
  ColorMatrixProto color_matrix = 1;
}

/**
 * androidx.compose.ui.graphics.LightingColorFilter 相当
 */
message LightingColorFilterProto {
  ColorProto multiply = 1;
  ColorProto add = 2;
}

/**
 * androidx.compose.ui.graphics.ColorFilter 相当
 */
message ColorFilterProto {
  oneof value {
    BlendModeColorFilterProto tint = 1;
    ColorMatrixColorFilterProto color_matrix = 2;
    LightingColorFilterProto lighting = 3;
  }
}
