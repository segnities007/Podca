syntax = "proto3";

package sdui.ui.graphics;

import "sdui/ui/geometry/Offset.proto";
import "sdui/ui/graphics/TileMode.proto";

option java_package = "com.podca.sdui.protocol.ui.graphics";
option java_multiple_files = true;

message BlurEffectProto {
  RenderEffectProto render_effect = 1;
  float radius_x = 2;
  float radius_y = 3;
  sdui.ui.graphics.TileModeProto edge_treatment = 4;
}

message OffsetEffectProto {
  RenderEffectProto render_effect = 1;
  sdui.ui.geometry.OffsetProto offset = 2;
}

message RenderEffectCapabilityProto {
  bool is_supported = 1;
}

message RenderEffectProto {
  RenderEffectCapabilityProto capability = 1;
  oneof value {
    BlurEffectProto blur = 2;
    OffsetEffectProto offset = 3;
  }
}
