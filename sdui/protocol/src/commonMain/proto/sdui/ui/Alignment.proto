syntax = "proto3";

package sdui.ui;

import "sdui/ui/alignment/Alignment.proto";

option java_package = "com.podca.sdui.protocol.ui";
option java_multiple_files = true;

message AlignmentBridgeProto {
  sdui.ui.alignment.AlignmentProto alignment = 1;
}

message HorizontalAlignmentBridgeProto {
  sdui.ui.alignment.HorizontalAlignmentProto alignment = 1;
}

message VerticalAlignmentBridgeProto {
  sdui.ui.alignment.VerticalAlignmentProto alignment = 1;
}
