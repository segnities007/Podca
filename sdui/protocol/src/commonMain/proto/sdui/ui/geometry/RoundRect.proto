syntax = "proto3";

package sdui.ui.geometry;

import "sdui/ui/geometry/CornerRadius.proto";

option java_package = "com.podca.sdui.protocol.ui.geometry";
option java_multiple_files = true;

/**
 * androidx.compose.ui.geometry.RoundRect 相当
 * 全ての角にカスタム半径を持つ不変の角丸矩形。
 */
message RoundRectProto {
  float left = 1;
  float top = 2;
  float right = 3;
  float bottom = 4;

  CornerRadiusProto top_left_radius = 5;
  CornerRadiusProto top_right_radius = 6;
  CornerRadiusProto bottom_right_radius = 7;
  CornerRadiusProto bottom_left_radius = 8;
}
