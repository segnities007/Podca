syntax = "proto3";

package sdui.ui.text;

import "sdui/ui/text/ParagraphStyle.proto";
import "sdui/ui/text/PlatformTextStyle.proto";
import "sdui/ui/text/SpanStyle.proto";

option java_package = "com.podca.sdui.protocol.ui.text";
option java_multiple_files = true;

/**
 * androidx.compose.ui.text.TextStyle 相当
 */
message TextStyleProto {
  SpanStyleProto span_style = 1;
  ParagraphStyleProto paragraph_style = 2;
  PlatformTextStyleProto platform_style = 3;
}
