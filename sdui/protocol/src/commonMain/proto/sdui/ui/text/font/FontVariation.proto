syntax = "proto3";

package sdui.ui.text.font;

import "sdui/ui/unit/TextUnit.proto";

option java_package = "com.podca.sdui.protocol.ui.text.font";
option java_multiple_files = true;

/**
 * androidx.compose.ui.text.font.FontVariation.Setting 相当
 */
message FontVariationSettingProto {
  string axis_name = 1;
  oneof value {
    float float_value = 2;
    int32 int_value = 3;
    sdui.ui.unit.TextUnitProto text_unit_value = 4;
  }
}

/**
 * androidx.compose.ui.text.font.FontVariation.Settings 相当
 */
message FontVariationSettingsProto {
  repeated FontVariationSettingProto settings = 1;
}
