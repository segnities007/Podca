syntax = "proto3";

package sdui.ui.unit;

option java_package = "com.podca.sdui.protocol.ui.unit";
option java_multiple_files = true;

/**
 * androidx.compose.ui.unit.IntSize 相当
 * ピクセル単位の2次元サイズ。
 */
message IntSizeProto {
  // 横幅 (pixels)
  int32 width = 1;

  // 高さ (pixels)
  int32 height = 2;
}
