<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Podca — server-driven UI for Compose Multiplatform. Author in Studio, render with Player on every target.">
    <meta name="theme-color" content="#19191C">
    <meta name="podca-api-base" content="http://127.0.0.1:9090">
    <!-- 未指定だと /favicon.ico を取りに行き dev サーバーで 404 になる -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%237F52FF'/%3E%3C/svg%3E" type="image/svg+xml">
    <title>Podca — SDUI for Compose Multiplatform</title>
    <!-- styles.css より前に最低限を描画し、未適用 CSS でレイアウトが走るのを抑える -->
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #19191C; }
        .loader { position: fixed; inset: 0; display: grid; place-items: center; background: #19191C; }
    </style>
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body>
<div id="loader" class="loader" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
        <circle cx="25" cy="25" r="20" stroke="#3D3D44" stroke-width="4" fill="none"/>
        <circle cx="25" cy="25" r="20" stroke="#7F52FF" stroke-width="4" fill="none" stroke-linecap="round"
                stroke-dasharray="90 125">
            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                              repeatCount="indefinite"/>
        </circle>
    </svg>
</div>
<script type="application/javascript" src="composeApp.js" defer></script>
</body>
</html>
